name: Update jobs

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: update-jobs
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate static jobs data
        env:
          RUN_MODE: github_actions
        run: python scripts/export_jobs.py

      - name: Upload last run report
        uses: actions/upload-artifact@v4
        with:
          name: last-run-report
          path: data/last_run_report.json

      - name: Commit updated data
        run: |
          if git diff --quiet -- web/src/data/jobs.json data/last_run_report.json data/source-health.json; then
            echo "No data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/src/data/jobs.json data/last_run_report.json data/source-health.json
          git commit -m "chore(data): refresh jobs"
          git push
